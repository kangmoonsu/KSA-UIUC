name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - "back/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Template
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build with Gradle
        run: |
          cd back/ksa
          chmod +x gradlew
          ./gradlew build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        run: |
          cd back/ksa
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ksa-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/ksa-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Create project directory if it doesn't exist
            mkdir -p ~/ksa-project
            cd ~/ksa-project

            # Pull the latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/ksa-backend:latest

            # Create docker-compose.yml on EC2 if it doesn't exist (copy from repo)
            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/ksa-backend:latest
                ports:
                  - "80:8080"
                depends_on:
                  - redis
                environment:
                  - SPRING_PROFILES_ACTIVE=service
                  - SPRING_REDIS_HOST=redis
                  - SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
                  - SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
                  - SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
                  - AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
                  - AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
                  - AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
                  - AWS_REGION=us-east-2
                  - CLERK_WEBHOOK_SECRET=${{ secrets.CLERK_WEBHOOK_SECRET }}
                  - CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
                  - SPRING_MAIL_PASSWORD=${{ secrets.SPRING_MAIL_PASSWORD }}
                restart: always
              redis:
                image: redis:alpine
                ports:
                  - "6379:6379"
                restart: always
            EOF

            # Stop and restart containers
            docker compose up -d --remove-orphans
